<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <h2>Create Account</h2>
            <p>Join WeatherApp today</p>
        </div>

        @if(error()){
        <div class="alert alert-error">
            {{error()}}
        </div>
        }

        <form (ngSubmit)="onSubmit()" class="register-form">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
            </div>


            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" name="password"
                        placeholder="Create a password (min. 4 characters)" required>
                    <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
                        {{ showPassword() ? '🙈' : '👁️' }}
                    </button>
                </div>
            </div>


            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="confirmPassword"
                        name="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" [disabled]="loading()">
                {{ loading() ? 'Creating account...' : 'Register' }}
            </button>
        </form>


        <div class="register-footer">
            <p>Already have an account? <a routerLink="/login">Login here</a></p>
        </div>
    </div>
</div>
